name: .NET CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Verify .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0

    - name: Restore
      run: dotnet restore Calculator.sln

    - name: Build
      run: dotnet build Calculator.sln --configuration Release --no-restore

    - name: Lint
      run: dotnet format Calculator.sln --verify-no-changes